server:
  port: ${SERVER_PORT}

spring:
  application:
    name: FITPLE
    frontend:
      url: ${FRONTEND_URL}

  servlet:
    multipart:
      enabled: true                # multipart 업로드 활성화
      max-file-size: 10MB           # 최대 파일 크기 (10MB)
      max-request-size: 10MB        # 최대 요청 크기 (10MB)
    resources:
      static-locations: file:./uploads/

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: ${SHOW_SQL}
    properties:
      hibernate.format_sql: ${FORMAT_SQL}
    hibernate:
      ddl-auto: ${DDL_AUTO}
    database-platform: org.hibernate.dialect.MySQLDialect


  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            client-id: ${OAUTH2_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH2_KAKAO_CLIENT_SECRET}
            scope:
              - profile_nickname
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH2_KAKAO_REDIRECT_URI}
            client-authentication-method: client_secret_post
          naver:
            client-id: ${OAUTH2_NAVER_CLIENT_ID}
            client-secret: ${OAUTH2_NAVER_CLIENT_SECRET}
            scope:
              - name
              - email
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH2_NAVER_REDIRECT_URI}

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

app:
  oauth2:
    password: ${OAUTH2_PASSWORD}
    auth-redirect-uri: ${AUTH_REDIRECT_URI}

  image:
    profile: ${PROFILE_PATH}
    upload: ${UPLOAD_PATH}